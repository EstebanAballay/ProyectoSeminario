<div class="admin-container">
  <header class="top-bar">
    <div class="logo-area">
      <div class="logo">
        <img src="assets/logo.png" alt="Logo Grafo">
      </div>
    </div>
    <div class="profile-area">
      <i class="fa-solid fa-circle-user" [routerLink]="['/perfil']"></i>
    </div>
  </header>

  <main class="dashboard-content">
    <h2 class="page-title">Administrador/a</h2>

    <div class="menu-list">

      <a routerLink="/admin/consultar-viajes" class="menu-item">
        <div class="icon-badge">
          <i class="fa-solid fa-truck"></i>
        </div>
        <div class="label-card">
          <span>Confirmar viajes</span>
        </div>
      </a>

      <a routerLink="/admin/agregar-empleados" class="menu-item">
        <div class="icon-badge">
          <i class="fa-solid fa-users-gear"></i>
        </div>
        <div class="label-card">
          <span>Gestión de Usuarios</span>
        </div>
      </a>

      <a routerLink="/admin/unidades" class="menu-item">
        <div class="icon-badge">
          <i class="fa-solid fa-truck-moving"></i>
        </div>
        <div class="label-card">
          <span>Agregar camiones / remolques</span>
        </div>
      </a>

      <a routerLink="/admin/gestion-vehiculos" class="menu-item">
        <div class="icon-badge">
          <i class="fa-solid fa-truck-moving"></i>
        </div>
        <div class="label-card">
          <span>Gestión de Vehículos</span>
        </div>
      </a>


      <div class="menu-item">
        <div class="icon-badge">
          <i class="fa-solid fa-envelope"></i>
        </div>
        <div class="label-card">
          <input type="email" [(ngModel)]="email" placeholder="Ingresa email" />
          <button (click)="descargar()">Enviar reporte</button>
        </div>
      </div>


    </div>
  </main>
</div>
